name: CI / Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (web)
        run: npm run build

  release:
    name: Package & Release
    runs-on: macos-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          # Disable code signing for unsigned CI builds
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload arm64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: Process-Mapper-arm64-dmg
          path: release/Process Mapper-*-arm64.dmg

      - name: Upload x64 DMG
        uses: actions/upload-artifact@v4
        with:
          name: Process-Mapper-x64-dmg
          path: release/Process Mapper-*.dmg
          exclude: release/Process Mapper-*-arm64.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Process Mapper-*-arm64.dmg
            release/Process Mapper-*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
